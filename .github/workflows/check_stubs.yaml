name: Check Python Stubs

on:
  pull_request:
    branches: ["master"]
  push:
    branches: ["master"]
  workflow_dispatch:

jobs:
  check-stubs:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            lib_name: libsassy.so
            stub_rustflags: ""
          - os: macos-latest
            lib_name: libsassy.dylib
            stub_rustflags: "-C link-arg=-undefined -C link-arg=dynamic_lookup"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Use portable config
        run: mv .cargo/config-portable.toml .cargo/config.toml

      - name: Generate stubs
        run: |
          RUSTFLAGS="${{ matrix.stub_rustflags }}" cargo build --features python
          cargo run --features python-stubs --bin gen_stubs -- target/debug/${{ matrix.lib_name }}
