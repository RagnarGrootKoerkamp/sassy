name: Build and publish sassy-rs wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            lib_name: libsassy.so
            stub_rustflags: ""
          - os: macos-latest
            target: aarch64-apple-darwin
            lib_name: libsassy.dylib
            stub_rustflags: "-C link-arg=-undefined -C link-arg=dynamic_lookup"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python (ABI-stable build)
        uses: actions/setup-python@v5
        with:
          python-version: "3.8"

      - name: Install build dependencies
        run: pip install "packaging>=24.2"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Initialize portable config
        run: mv .cargo/config-portable.toml .cargo/config.toml

      - name: Generate stubs
        run: |
          RUSTFLAGS="${{ matrix.stub_rustflags }}" cargo build --features python
          cargo run --features python-stubs --bin gen_stubs -- target/debug/${{ matrix.lib_name }}

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          args: --profile dist --features python --out dist --target ${{ matrix.target }}
          sccache: "true"
          manylinux: auto
        env:
          PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

      - name: Upload wheel
        uses: actions/upload-artifact@v6
        with:
          name: wheel-${{ matrix.target }}
          path: dist/*

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Download built artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - run: ls -R dist

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist
          working-directory: .

      - name: Install upload dependencies
        run: pip install --upgrade "packaging>=24.2" twine

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload --skip-existing dist/*
